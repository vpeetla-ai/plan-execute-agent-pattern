<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plan-Execute — Live Demo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__inner">
        <a href="/" class="brand">
          <div class="brand__mark">P3</div>
          <div class="brand__text">
            <p class="brand__eyebrow">Production agent patterns · 3/5</p>
            <p class="brand__title">Plan-Execute</p>
          </div>
        </a>
        <div class="header-actions">
          <span class="status-badge">Deterministic demo</span>
          <a href="https://github.com/vpeetla-ai/plan-execute-agent-pattern" class="btn-ghost" style="padding:0.4rem 0.75rem;font-size:0.8rem;text-decoration:none">GitHub</a>
        </div>
      </div>
    </header>
    <main class="shell app-main">
      <div class="page-hero">
        <p class="eyebrow">Decompose → execute → verify</p>
        <h1>Plan-Execute Agent Pattern</h1>
        <p class="lede">Structured migration planning with specialist steps and a verifier gate.</p>
      </div>
      <section class="panel">
        <h2>Run demo</h2>
        <div class="inline-actions"><button id="run" type="button">Run architecture review plan</button></div>
        <div id="answer" class="answer"></div>
        <div id="trace" class="trace-events"></div>
      </section>
    </main>
    <footer class="app-footer">Plan-Execute pattern · <a href="https://github.com/vpeetla-ai/plan-execute-agent-pattern">vpeetla-ai</a></footer>
    <script>
      const DEMO = {
        answer: "Migration plan: inventory → pilot → dual-read → cutover with rollback.",
        events: [
          { name: "planner.plan", payload: { steps: ["Inventory services", "Pilot low-risk workloads", "Dual-read verification", "Cutover with rollback"] } },
          { name: "executor.step", payload: { step: 1, result: "12 services mapped with owners" } },
          { name: "executor.step", payload: { step: 2, result: "3 services migrated to staging" } },
          { name: "verifier.check", payload: { status: "pass", coverage: "telemetry parity" } },
        ],
      };
      const trace = document.getElementById("trace");
      document.getElementById("run").onclick = async () => {
        trace.innerHTML = "";
        document.getElementById("answer").textContent = "";
        for (const e of DEMO.events) {
          const el = document.createElement("div");
          el.className = "event live";
          el.innerHTML = `<strong>${e.name}</strong><pre>${JSON.stringify(e.payload, null, 2)}</pre>`;
          trace.appendChild(el);
          await new Promise((r) => setTimeout(r, 700));
          el.classList.remove("live");
          el.classList.add("done");
        }
        document.getElementById("answer").textContent = DEMO.answer;
      };
    </script>
  </body>
</html>
